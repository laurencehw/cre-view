databases:
  - name: creview-db
    plan: free
    databaseName: creview
    user: creview
    postgresMajorVersion: "16"

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: creview-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build --workspace=backend
    startCommand: cd backend && node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: creview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VISION_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false  # set manually in dashboard
      - key: CORS_ORIGIN
        sync: false  # set to your frontend URL after deploy
      - key: LOG_LEVEL
        value: info

  # ─── Frontend (static site) ────────────────────────────────────────────────
  - type: web
    name: creview-web
    runtime: static
    buildCommand: npm install && npm run build --workspace=frontend
    staticPublishPath: frontend/out
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false  # set to your backend URL after deploy
