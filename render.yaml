databases:
  - name: creview-db
    plan: free
    databaseName: creview
    user: creview
    postgresMajorVersion: "16"

services:
  # Single service: Express serves both API and the Next.js static export
  - type: web
    name: creview-app
    runtime: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npm run build --workspace=backend && npm run build --workspace=frontend
    startCommand: cd backend && node dist/db/migrate.js && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: creview-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VISION_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false  # set manually in dashboard
      - key: LOG_LEVEL
        value: info
